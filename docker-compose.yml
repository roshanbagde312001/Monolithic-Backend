version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: app-defend-postgres
    environment:
      POSTGRES_DB: appdefend
      POSTGRES_USER: appdefend
      POSTGRES_PASSWORD: appdefend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appdefend -d appdefend"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app-defend-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
